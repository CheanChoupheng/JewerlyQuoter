<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Jewelry Quoter</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
  <style>
    body { font-family: -apple-system, BlinkMacSystemFont, sans-serif; padding: 10px; margin: 0; background-color: #f4f4f9; color: #333; }
    .container { max-width: 600px; margin: auto; background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
    h2 { margin-top: 0; color: #2c3e50; text-align: center; border-bottom: 2px solid #eee; padding-bottom: 10px; }

    .section { border: 1px solid #e0e0e0; padding: 15px; margin-bottom: 15px; border-radius: 8px; background: #fafafa; }
    .section h3 { margin-top: 0; font-size: 16px; border-bottom: 1px solid #ddd; padding-bottom: 8px; color: #555; }
    
    input, button { padding: 12px; font-size: 15px; border: 1px solid #ccc; border-radius: 6px; box-sizing: border-box; }
    .input-group { margin-bottom: 10px; display: flex; flex-direction: column; width: 100%; }
    .input-group label { font-size: 13px; margin-bottom: 5px; color: #666; font-weight: bold; }
    .flex-row { display: flex; gap: 10px; }
    
    .image-upload-wrapper { display: flex; flex-direction: column; align-items: center; justify-content: center; border: 2px dashed #ccc; padding: 15px; border-radius: 8px; background: #fff; cursor: pointer; margin-bottom: 15px; text-align: center; }
    #item-preview { max-width: 100%; max-height: 250px; border-radius: 8px; display: none; margin-top: 10px; object-fit: contain; }

    .tabs { display: flex; margin-bottom: 15px; background: #eee; border-radius: 8px; overflow: hidden; }
    .tab-btn { flex: 1; padding: 12px; border: none; background: transparent; font-size: 14px; font-weight: bold; color: #666; cursor: pointer; transition: 0.2s; }
    .tab-btn.active { background: #2c3e50; color: white; }

    .gem-row { display: flex; gap: 8px; margin-bottom: 10px; align-items: center; }
    .select-size-btn { flex: 2; background: white; cursor: pointer; text-align: left; color: #333; font-weight: bold; border: 2px solid #2c3e50; }
    .custom-price { flex: 1.2; min-width: 70px; display: none; background-color: #fffbdd; }
    .gem-qty { flex: 1; min-width: 60px; }
    .delete-btn { background: #ff4757; color: white; border: none; padding: 12px; cursor: pointer; font-weight: bold; }
    .add-btn { background: #2ed573; color: white; border: none; width: 100%; font-weight: bold; cursor: pointer; margin-top: 5px; }

    .total-section { background: #2f3542; color: white; text-align: center; padding: 20px; border-radius: 8px; margin-top: 20px; }
    .total-section h3 { margin: 0; font-size: 26px; font-weight: bold; }
    
    .action-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 15px; }
    .action-btn { font-weight: bold; cursor: pointer; color: white; border: none; padding: 15px; border-radius: 8px; }
    .btn-blue { background: #3498db; }
    .btn-orange { background: #e67e22; }
    .btn-purple { background: #9b59b6; }
    .btn-gray { background: #7f8c8d; }
    .btn-full { grid-column: span 2; background: #2c3e50; }

    .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); align-items: center; justify-content: center; z-index: 1000; }
    .modal-content { background: white; padding: 20px; border-radius: 12px; width: 90%; max-width: 450px; max-height: 85vh; overflow-y: auto; }
    .modal-header { display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #eee; padding-bottom: 10px; margin-bottom: 15px; position: sticky; top: -20px; background: white; padding-top: 10px;}
    .close-modal { background: none; border: none; font-size: 28px; cursor: pointer; color: #888; padding: 0; }
    
    .gem-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; }
    .grid-item { background: #f8f9fa; border: 1px solid #ddd; border-radius: 8px; padding: 12px 4px; text-align: center; cursor: pointer; }
    .grid-item:active { background: #e0e0e0; }
    .grid-item .size-label { font-weight: bold; display: block; font-size: 14px; }
    .grid-item .price-label { font-size: 13px; color: #2ed573; margin-top: 4px; display: block; font-weight: bold; }
    
    .job-history-item { padding: 15px; border: 1px solid #ddd; border-radius: 8px; margin-bottom: 10px; cursor: pointer; background: #f9f9f9; display: flex; align-items: center; gap: 15px; }
    .job-history-item:hover { background: #eee; }
    .job-history-img { width: 50px; height: 50px; object-fit: cover; border-radius: 6px; background: #ddd; }

    @media print {
      body { background: white; padding: 0; }
      .container { box-shadow: none; max-width: 100%; padding: 0; }
      .no-print { display: none !important; }
      .select-size-btn { border: none; padding: 0; }
      input { border: none; background: transparent; padding: 0; text-align: right;}
      .input-group label { margin-bottom: 0; }
      .section { border: none; border-bottom: 1px solid #ccc; padding: 10px 0; border-radius: 0; }
    }
    .print-only { display: none; }
    @media print { .print-only { display: block; text-align: center; color: #888; font-size: 12px; margin-top: 20px; } }
  </style>
</head>
<body>

<div class="container" id="quote-capture-area">
  <h2>Jewelry Quotation</h2>

  <div class="section">
    <div class="flex-row">
      <div class="input-group">
        <label>Customer Name / Ref</label>
        <input type="text" id="customer-name" placeholder="e.g. Diamond Ring">
      </div>
      <div class="input-group">
        <label>Date</label>
        <input type="date" id="quote-date">
      </div>
    </div>
    
    <label class="image-upload-wrapper no-print">
      <span style="font-size: 14px; color: #666;">📷 Tap to Upload Photo</span>
      <input type="file" id="image-upload" accept="image/*" style="display: none;" onchange="previewAndCompressImage(event)">
    </label>
    <img id="item-preview" src="" alt="Jewelry Preview">
  </div>

  <div class="tabs no-print">
    <button class="tab-btn active" id="tab-normal" onclick="setCustomerType('normal')">Normal Price</button>
    <button class="tab-btn" id="tab-bulk" onclick="setCustomerType('bulk')">Bulk Price</button>
  </div>

  <div class="section">
    <h3>Diamonds & Gems</h3>
    <div id="gem-container"></div>
    <button class="add-btn no-print" onclick="addGemRow()">+ Add Another Line</button>
  </div>

  <div class="section">
    <h3>Metal & Labor</h3>
    <div class="flex-row">
      <div class="input-group">
        <label>Weight (Taels)</label>
        <input type="number" id="metal-weight" placeholder="0" step="0.01" oninput="calculateTotal()">
      </div>
      <div class="input-group">
        <label>Cost per Tael ($)</label>
        <input type="number" id="metal-cost" placeholder="0" step="0.01" oninput="calculateTotal()">
      </div>
    </div>
    <div class="input-group" style="margin-top: 10px;">
      <label>Labor & Setting ($)</label>
      <input type="number" id="labor-cost" placeholder="0" step="0.01" oninput="calculateTotal()">
    </div>
  </div>

  <div class="total-section">
    <h3>Total: $<span id="grand-total">0.00</span></h3>
  </div>

  <div class="print-only">Generated securely by Jewelry Quoter</div>

  <div class="action-grid no-print">
    <button class="action-btn btn-blue" onclick="exportImage()">📸 Save as Image</button>
    <button class="action-btn btn-purple" onclick="window.print()">🖨️ Print / PDF</button>
    <button class="action-btn btn-orange" onclick="copyToSetter()">📋 Copy to Clipboard</button>
    <button class="action-btn btn-full" onclick="saveJobToHistory()">💾 Save Job (Up to 20)</button>
    <button class="action-btn btn-gray" onclick="openHistoryModal()">📂 View History</button>
    <button class="action-btn btn-gray" onclick="clearAll()">🔄 Clear Form</button>
  </div>
</div>

<div class="modal" id="gem-modal">
  <div class="modal-content">
    <div class="modal-header">
      <h3 style="margin:0;">Pick a Size</h3>
      <button class="close-modal" onclick="closeModal('gem-modal')">×</button>
    </div>
    <div class="gem-grid" id="gem-grid-container"></div>
  </div>
</div>

<div class="modal" id="history-modal">
  <div class="modal-content">
    <div class="modal-header">
      <h3 style="margin:0;">Saved Jobs</h3>
      <button class="close-modal" onclick="closeModal('history-modal')">×</button>
    </div>
    <div id="history-list-container"></div>
  </div>
</div>

<script>
  document.getElementById('quote-date').valueAsDate = new Date();

  const pricingData = {
    normal: { "1.0mm": 6, "1.2mm": 9, "1.3mm": 11, "1.5mm": 13, "1.8mm": 21, "2.0mm": 32, "2.3mm": 42, "2.5mm": 63, "2.7mm": 72, "3.0mm": 142, "3.2mm": 152, "3.5mm": 275, "3.7mm": 290, "4.0mm": 510, "4.2mm": 540, "4.5mm": 800, "4.5 GIA": 900, "5.0mm": 1600, "5.0 GIA": 1800, "5.5mm": 2800, "5.5 GIA": 3000, "6.0mm": 4800, "6.0 GIA": 5100, "6.5mm": 0, "6.5 GIA": 0, "7.0mm": 0, "7.0 GIA": 0, "Custom": 0 },
    bulk: { "1.0mm": 5, "1.2mm": 8, "1.3mm": 10, "1.5mm": 12, "1.8mm": 20, "2.0mm": 30, "2.3mm": 40, "2.5mm": 60, "2.7mm": 70, "3.0mm": 140, "3.2mm": 150, "3.5mm": 265, "3.7mm": 275, "4.0mm": 490, "4.2mm": 520, "4.5mm": 700, "4.5 GIA": 800, "5.0mm": 1550, "5.0 GIA": 1750, "5.5mm": 2750, "5.5 GIA": 2900, "6.0mm": 4700, "6.0 GIA": 5000, "6.5mm": 0, "6.5 GIA": 0, "7.0mm": 0, "7.0 GIA": 0, "Custom": 0 }
  };

  let currentCustomerType = 'normal';
  let activeRowButton = null;
  let savedImageData = ""; 

  function setCustomerType(type) {
    currentCustomerType = type;
    document.getElementById('tab-normal').classList.remove('active');
    document.getElementById('tab-bulk').classList.remove('active');
    document.getElementById('tab-' + type).classList.add('active');

    const rows = document.querySelectorAll('.gem-row');
    rows.forEach(row => {
      const btn = row.querySelector('.select-size-btn');
      const sizeKey = btn.getAttribute('data-size');
      if (sizeKey) {
        const price = pricingData[currentCustomerType][sizeKey];
        const customPriceInput = row.querySelector('.custom-price');
        if (price > 0) { btn.innerText = sizeKey + " ($" + price + ")"; customPriceInput.style.display = 'none'; } 
        else { btn.innerText = sizeKey; customPriceInput.style.display = 'inline-block'; }
      }
    });
    calculateTotal();
  }

  function addGemRow(size = "", qty = "", customP = "") {
    const container = document.getElementById('gem-container');
    const row = document.createElement('div');
    row.className = 'gem-row';
    
    let btnText = "Pick Size ▼";
    let displayCustom = "none";
    if (size !== "") {
        const price = pricingData[currentCustomerType][size];
        if (price > 0) { btnText = size + " ($" + price + ")"; }
        else { btnText = size; displayCustom = "inline-block"; }
    }

    row.innerHTML = `<button class="select-size-btn" onclick="openGemModal(this)" data-size="${size}">${btnText}</button>
                     <input type="number" class="custom-price" placeholder="Price $" value="${customP}" style="display:${displayCustom}" oninput="calculateTotal()">
                     <input type="number" class="gem-qty" placeholder="Qty" value="${qty}" min="1" oninput="calculateTotal()">
                     <button class="delete-btn no-print" onclick="this.parentElement.remove(); calculateTotal()">X</button>`;
    container.appendChild(row);
  }

  function openGemModal(buttonElement) {
    activeRowButton = buttonElement;
    const gridContainer = document.getElementById('gem-grid-container');
    gridContainer.innerHTML = ''; 
    const currentPrices = pricingData[currentCustomerType];
    for (const size in currentPrices) {
      const price = currentPrices[size];
      const gridItem = document.createElement('div');
      gridItem.className = 'grid-item';
      gridItem.onclick = function() { selectSize(size); };
      let priceHtml = price > 0 ? `<span class="price-label">$${price}</span>` : `<span class="price-label" style="color:#f39c12;">Set Price</span>`;
      gridItem.innerHTML = `<span class="size-label">${size}</span>${priceHtml}`;
      gridContainer.appendChild(gridItem);
    }
    document.getElementById('gem-modal').style.display = 'flex';
  }

  function closeModal(modalId) { document.getElementById(modalId).style.display = 'none'; activeRowButton = null; }

  function selectSize(sizeKey) {
    if (activeRowButton) {
      const price = pricingData[currentCustomerType][sizeKey];
      const row = activeRowButton.parentElement;
      const customPriceInput = row.querySelector('.custom-price');
      activeRowButton.setAttribute('data-size', sizeKey);
      if (price > 0) {
        activeRowButton.innerText = sizeKey + " ($" + price + ")";
        customPriceInput.style.display = 'none'; customPriceInput.value = ''; 
      } else {
        activeRowButton.innerText = sizeKey;
        customPriceInput.style.display = 'inline-block'; customPriceInput.value = ''; 
      }
      row.querySelector('.gem-qty').value = '';
      calculateTotal();
    }
    closeModal('gem-modal');
  }

  function calculateTotal() {
    let total = 0;
    const rows = document.querySelectorAll('.gem-row');
    rows.forEach(row => {
       const sizeKey = row.querySelector('.select-size-btn').getAttribute('data-size');
       if (sizeKey) {
         let price = pricingData[currentCustomerType][sizeKey] || 0;
         if (price === 0) price = parseFloat(row.querySelector('.custom-price').value) || 0;
         const quantity = parseInt(row.querySelector('.gem-qty').value) || 0;
         total += (price * quantity);
       }
    });
    total += (parseFloat(document.getElementById('metal-weight').value) || 0) * (parseFloat(document.getElementById('metal-cost').value) || 0);
    total += parseFloat(document.getElementById('labor-cost').value) || 0;
    document.getElementById('grand-total').innerText = total.toFixed(2);
    return total;
  }

  // IMAGE COMPRESSOR
  function previewAndCompressImage(event) {
    const file = event.target.files[0];
    if (!file) return;

    const reader = new FileReader();
    reader.onload = function(e) {
      const img = new Image();
      img.onload = function() {
        const canvas = document.createElement('canvas');
        const MAX_WIDTH = 400; // Shrinks image width to 400px
        const scaleSize = MAX_WIDTH / img.width;
        canvas.width = MAX_WIDTH;
        canvas.height = img.height * scaleSize;

        const ctx = canvas.getContext('2d');
        ctx.drawImage(img, 0, 0, canvas.width, canvas.height);

        // Convert canvas back to a highly compressed JPEG
        savedImageData = canvas.toDataURL('image/jpeg', 0.6); 
        
        const imgElement = document.getElementById('item-preview');
        imgElement.src = savedImageData;
        imgElement.style.display = 'block';
      };
      img.src = e.target.result;
    };
    reader.readAsDataURL(file);
  }

  function exportImage() {
    const noPrintEls = document.querySelectorAll('.no-print');
    noPrintEls.forEach(el => el.style.display = 'none');
    
    html2canvas(document.getElementById('quote-capture-area'), { backgroundColor: "#ffffff" }).then(canvas => {
      noPrintEls.forEach(el => el.style.display = '');
      const link = document.createElement('a');
      link.download = `Quote-${document.getElementById('customer-name').value || 'New'}.png`;
      link.href = canvas.toDataURL('image/png');
      link.click();
    });
  }

  function copyToSetter() {
    let text = `*Job:* ${document.getElementById('customer-name').value || 'New Item'}\n`;
    const weight = document.getElementById('metal-weight').value;
    if(weight) text += `*Metal:* ${weight} taels\n`;
    
    let gemsText = "";
    document.querySelectorAll('.gem-row').forEach(row => {
       const size = row.querySelector('.select-size-btn').getAttribute('data-size');
       const qty = row.querySelector('.gem-qty').value;
       if(size && qty) gemsText += `- ${qty}x ${size}\n`;
    });
    if(gemsText) text += `*Gems to set:*\n${gemsText}`;
    
    text += `*Setting Labor:* $${document.getElementById('labor-cost').value || 0}`;
    
    navigator.clipboard.writeText(text).then(() => { alert("Instructions copied to clipboard!"); });
  }

  function saveJobToHistory() {
    const job = {
      id: Date.now(),
      name: document.getElementById('customer-name').value || "Unnamed Job",
      date: document.getElementById('quote-date').value,
      image: savedImageData,
      type: currentCustomerType,
      metalWeight: document.getElementById('metal-weight').value,
      metalCost: document.getElementById('metal-cost').value,
      labor: document.getElementById('labor-cost').value,
      total: document.getElementById('grand-total').innerText,
      gems: []
    };

    document.querySelectorAll('.gem-row').forEach(row => {
      const size = row.querySelector('.select-size-btn').getAttribute('data-size');
      if (size) {
        job.gems.push({ size: size, qty: row.querySelector('.gem-qty').value, custom: row.querySelector('.custom-price').value });
      }
    });

    let history = JSON.parse(localStorage.getItem('jobHistory')) || [];
    history.unshift(job); 
    if (history.length > 20) history = history.slice(0, 20); // Now safely handles 20 jobs
    
    localStorage.setItem('jobHistory', JSON.stringify(history));
    alert("Job saved successfully!");
  }

  function openHistoryModal() {
    const history = JSON.parse(localStorage.getItem('jobHistory')) || [];
    const container = document.getElementById('history-list-container');
    container.innerHTML = '';
    
    if (history.length === 0) {
        container.innerHTML = '<p>No saved jobs yet.</p>';
    } else {
        history.forEach(job => {
          const div = document.createElement('div');
          div.className = 'job-history-item';
          
          let imgHtml = job.image ? `<img src="${job.image}" class="job-history-img">` : `<div class="job-history-img" style="display:flex;align-items:center;justify-content:center;font-size:10px;color:#888;">No Img</div>`;
          
          div.innerHTML = `${imgHtml} <div><strong>${job.name}</strong><br><span style="font-size:12px;color:#666;">${job.date}</span><br><span style="color:#2ed573;font-weight:bold;">$${job.total}</span></div>`;
          div.onclick = () => loadJob(job);
          container.appendChild(div);
        });
    }
    document.getElementById('history-modal').style.display = 'flex';
  }

  function loadJob(job) {
    document.getElementById('customer-name').value = job.name;
    document.getElementById('quote-date').value = job.date;
    
    savedImageData = job.image || "";
    const imgElement = document.getElementById('item-preview');
    if (savedImageData) { imgElement.src = savedImageData; imgElement.style.display = 'block'; } 
    else { imgElement.style.display = 'none'; }

    setCustomerType(job.type);
    document.getElementById('metal-weight').value = job.metalWeight;
    document.getElementById('metal-cost').value = job.metalCost;
    document.getElementById('labor-cost').value = job.labor;

    document.getElementById('gem-container').innerHTML = '';
    if (job.gems && job.gems.length > 0) {
        job.gems.forEach(g => addGemRow(g.size, g.qty, g.custom));
    } else { addGemRow(); }

    calculateTotal();
    closeModal('history-modal');
  }

  function clearAll() {
    document.getElementById('customer-name').value = '';
    document.getElementById('quote-date').valueAsDate = new Date();
    document.getElementById('item-preview').style.display = 'none';
    savedImageData = '';
    document.getElementById('gem-container').innerHTML = '';
    document.getElementById('metal-weight').value = '';
    document.getElementById('metal-cost').value = '';
    document.getElementById('labor-cost').value = '';
    setCustomerType('normal');
    addGemRow();
  }

  addGemRow();
</script>

</body>
</html>
